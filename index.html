<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Offline Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Offline Player">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Offline Player</h1>
      <div class="header-buttons">
        <button id="importZipBtn">Import ZIP</button>
        <button id="newAlbumBtn">New Album</button>
        <button id="importBtn">Import Tracks</button>

        <input id="zipInput" type="file" accept=".zip" style="display:none">
        <input id="fileInput" type="file" accept="audio/*" multiple style="display:none">
      </div>
    </header>

    <main>
      <section>
        <h2>Albums</h2>
        <ul id="albumList"></ul>
      </section>

      <section>
        <h2 id="tracksTitle">Tracks</h2>
        <ul id="trackList"></ul>
      </section>
    </main>

    <footer>
      <div id="nowPlaying">Nothing playing</div>
      <div id="controls">
        <button id="playPauseBtn" disabled>Play</button>
        <input id="seek" type="range" min="0" max="100" value="0">
      </div>
    </footer>
  </div>

  <audio id="audio" preload="auto"></audio>

  <!-- Album popup -->
  <div id="albumPopup" class="popup">
    <div class="popup-inner">
      <h3>New Album</h3>
      <input id="albumNameInput" placeholder="Album name">
      <label class="file-label">
        Cover image
        <input id="albumCoverInput" type="file" accept="image/*">
      </label>
      <div class="popup-buttons">
        <button id="createAlbumBtn">Create</button>
        <button id="cancelAlbumBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="jszip.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
